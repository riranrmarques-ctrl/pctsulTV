<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salas | PCTSUL TV</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: rgb(5, 12, 18);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px 22px 72px;
    }

    .page {
      width: min(460px, 100%);
    }

    .logo {
      width: min(310px, 78vw);
      height: 120px;
      display: block;
      object-fit: contain;
      margin: 0 auto 18px;
    }

    .card {
      width: 100%;
      padding: 26px 22px 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.05;
      text-align: center;
    }

    .sub {
      margin: 0 auto 22px;
      max-width: 330px;
      color: rgb(180, 196, 210);
      font-size: 16px;
      line-height: 1.35;
      text-align: center;
    }

    .menu {
      display: grid;
      gap: 13px;
    }

    .menu-link {
      position: relative;
      min-height: 62px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      overflow: hidden;
      border-radius: 14px;
      background: #fff;
      color: #050505;
      text-decoration: none;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .menu-link::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, rgba(0, 0, 0, 0.08) 42%, transparent 68%);
      transform: translateX(-120%);
      animation: buttonSheen 3.4s ease-in-out infinite;
      pointer-events: none;
    }

    .menu-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
    }

    .menu-link:active {
      transform: translateY(1px) scale(0.99);
    }

    .menu-link span {
      position: relative;
      z-index: 1;
    }

    .menu-link strong {
      position: relative;
      z-index: 1;
      font-size: 24px;
      line-height: 1;
    }

    .signature {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 22px;
      color: rgb(130, 145, 160);
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.04em;
    }

    @keyframes buttonSheen {
      0%, 45% {
        transform: translateX(-120%);
      }

      75%, 100% {
        transform: translateX(120%);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="logo.png" class="logo" alt="PCTSUL TV">

    <section class="card">
      <h1>Salas</h1>
      <p class="sub">Escolha uma opção para continuar.</p>

      <nav class="menu" aria-label="Menu de salas">
        <a class="menu-link" href="ativador.html">
          <span>Ativador</span>
          <strong>›</strong>
        </a>

        <a class="menu-link" href="player-teste-pctsul.html">
          <span>Player</span>
          <strong>›</strong>
        </a>
      </nav>
    </section>
  </main>

  <div class="signature">desenvolvimento pela DUNA BRANDING</div>
</body>
</html>
