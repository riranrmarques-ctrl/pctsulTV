<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview PCTSul Indoor</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #07120d; color: #fff; font-family: Arial, Helvetica, sans-serif; }
    .tv { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: linear-gradient(90deg, rgba(4,12,8,.88), rgba(4,12,8,.54) 42%, rgba(4,12,8,.06)), var(--image); background-size: cover; background-position: center; }
    .tv::after { content: ""; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,.42), transparent 34%); }
    .content { position: relative; z-index: 1; width: 48vw; min-width: 560px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; padding: 5vw 5vw 8.5vw; }
    .brand { display: none; }
    .mark { width: 14px; height: 42px; border-radius: 999px; background: #70c947; }
    .date { width: fit-content; padding: 0; border: 0; border-radius: 0; background: transparent; color: rgba(255,255,255,.74); font-size: 18px; font-weight: 700; }
    h1 { margin: 0; max-width: 760px; font-size: clamp(30px, 3vw, 54px); line-height: 1.08; letter-spacing: 0; text-wrap: balance; }
    p { max-width: 760px; margin: 0; color: rgba(255,255,255,.88); font-size: clamp(20px, 1.55vw, 30px); line-height: 1.25; font-weight: 500; }
    .source { position: absolute; left: 5vw; bottom: 4.2vw; color: rgba(255,255,255,.66); font-size: 18px; font-weight: 700; }
    .qr-card { position: absolute; right: 4.4vw; bottom: 4.4vw; z-index: 3; display: grid; gap: 10px; justify-items: center; width: 174px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,.94); color: #143323; box-shadow: 0 18px 48px rgba(0,0,0,.26); }
    .qr-card img { display: block; width: 150px; height: 150px; }
    .qr-card span { font-size: 15px; line-height: 1; font-weight: 400; letter-spacing: 0; }
    .progress { position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; height: 10px; background: rgba(255,255,255,.18); }
    .progress span { display: block; height: 100%; background: #70c947; animation: timer 12s linear infinite; }
    @keyframes timer { from { width: 0; } to { width: 100%; } }
  </style>
</head>
<body>
  <main id="tv" class="tv">
    <section class="content">
      <div class="brand"><span class="mark"></span><span>PCTSul Notícias</span></div>
      <div id="date" class="date"></div>
      <h1 id="title"></h1>
      <p id="summary"></p>
      <div class="source">pctsul.org/conteudos</div>
    </section>
    <aside class="qr-card" aria-label="Acesse o blog para ler a noticia completa">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=12&data=https%3A%2F%2Ftriumphant-predict-088216.framer.app%2Fblog" alt="QR code para acessar o blog PCTSul">
      <span>veja completo no site</span>
    </aside>
    <div class="progress"><span id="bar"></span></div>
  </main>

  <script>
    const news = [
      {
        title: "Pesquisadores criam referência inédita para o cacau do Sul da Bahia",
        date: "4 de jun. de 2026",
        summary: "Estudo liderado pelo PCTSul definiu faixas de micronutrientes para lavouras de cacau, ajudando produtores a tomar decisões mais precisas sobre adubação.",
        image: "https://framerusercontent.com/images/k5NInxmqyZQKQ5G3zVT3Cwg.png?width=2048&height=1365"
      },
      {
        title: "Sul da Bahia amplia oferta de qualificação para a cadeia do cacau",
        date: "23 de abr. de 2026",
        summary: "O CIC lançou sua programação de cursos para 2026, fortalecendo a formação em cacau especial e chocolate bean to bar.",
        image: "https://framerusercontent.com/images/dFFwG6ouF0OE3jc54nXsxdv5AYw.png?width=1920&height=910"
      },
      {
        title: "Inscrições abertas para o Concurso Nacional de Cacau Especial do Brasil",
        date: "19 de mar. de 2026",
        summary: "A 8ª edição reconhece os melhores lotes do país e integra a seletiva brasileira para uma das principais premiações internacionais do setor.",
        image: "https://framerusercontent.com/images/KFjS88Xj42nytSuiD5MVYyIZgo.png?width=2048&height=933"
      }
    ];

    let index = 0;
    const tv = document.getElementById("tv");
    const dateEl = document.getElementById("date");
    const titleEl = document.getElementById("title");
    const summaryEl = document.getElementById("summary");
    const bar = document.getElementById("bar");

    function show() {
      const item = news[index % news.length];
      dateEl.textContent = item.date;
      titleEl.textContent = item.title;
      summaryEl.textContent = item.summary;
      tv.style.setProperty("--image", `url("${item.image}")`);
      bar.style.animation = "none";
      void bar.offsetWidth;
      bar.style.animation = "";
      index += 1;
    }

    show();
    setInterval(show, 12000);
  </script>
</body>
</html>
